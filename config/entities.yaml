binary_sensors:
  - name: "TV Power"
    unique_id: "tv_power"
    state: "tv.check_power_status"
    device_class: "power"
    icon: "mdi:television"

sensors:
  - name: "IP Address"
    unique_id: "ip_address"
    state: "utils.get_ip_address"
    entity_category: "diagnostic"
    icon: "mdi:ip-network"

  - name: "CPU Temperature"
    unique_id: "cpu_temperature"
    state: "utils.get_cpu_temperature"
    entity_category: "diagnostic"
    device_class: "temperature"

  - name: "Memory Usage"
    unique_id: "memory_usage"
    state: "utils.get_memory_usage"
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    icon: "mdi:memory"

  - name: "Swap Usage"
    unique_id: "swap_usage"
    state: "utils.get_swap_usage"
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    icon: "mdi:swap-horizontal"

  - name: "Disk Usage"
    unique_id: "disk_usage"
    state: "utils.get_disk_usage"
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    icon: "mdi:micro-sd"

  - name: "TV Current Input"
    unique_id: "tv_current_input"
    state: "tv.update_input"
    icon: "mdi:import"

  - name: "Current App"
    unique_id: "current_app"
    state: "supervisor.get_current_app_display_name"
    icon: "mdi:application"

buttons:
  - name: "Reboot"
    unique_id: "reboot"
    callback: "utils.reboot"
    entity_category: "config"
    device_class: "restart"

  - name: "Shutdown"
    unique_id: "shutdown"
    callback: "utils.shutdown"
    entity_category: "config"
    icon: "mdi:power-plug-off-outline"

  - name: "Update Pi"
    unique_id: "update_pi"
    callback: "utils.update_pi"
    entity_category: "config"
    device_class: "update"

  - name: "TV Power On"
    unique_id: "tv_power_on"
    callback: "tv.power_on"
    icon: "mdi:power"

  - name: "TV Standby"
    unique_id: "tv_standby"
    callback: "tv.standby"
    icon: "mdi:power-sleep"

  - name: "TV Input RPi"
    unique_id: "tv_input_rpi"
    callback: "tv.set_input_rpi"
    icon: "mdi:raspberry-pi"

  - name: "TV Input HDMI"
    unique_id: "tv_input_hdmi"
    callback: "tv.set_input_hdmi"
    icon: "mdi:hdmi-port"

  - name: "Start MagicMirror App"
    unique_id: "start_magicmirror"
    callback: "supervisor.start_app"
    args: ["magicmirror2"]
    icon: "mdi:mirror-rectangle"

  - name: "Start Home Assistant"
    unique_id: "start_home_assistant"
    callback: "supervisor.start_app"
    args: ["homeassistant_mirror_dashboard"]
    icon: "mdi:home-assistant"

  - name: "Stop All Apps"
    unique_id: "stop_all_apps"
    callback: "supervisor.stop_all_apps"
    icon: "mdi:close-octagon"

  - name: "Update Supervisor"
    unique_id: "update_supervisor"
    callback: "utils.update_supervisor"
    entity_category: "config"
    device_class: "update"

  - name: "Restart Supervisor"
    unique_id: "restart_supervisor"
    callback: "utils.restart_supervisor"
    entity_category: "config"
    device_class: "restart"

  - name: "Refresh Kiosk"
    unique_id: "refresh_kiosk"
    callback: "supervisor.refresh_kiosk"
    device_class: "restart"

switches:
  - name: "TV Power"
    unique_id: "tv_power_switch"
    on_callback: "tv.power_on"
    off_callback: "tv.standby"
    state: "tv.check_power_status"

selects:
  - name: "Default Startup App"
    unique_id: "default_app"
    # "{{apps_all}}" auto-populates the options from apps.yaml, showing each app's `name`
    # (not its key), with "No Startup App" first (and as the default) meaning "don't
    # auto-start anything". (Not literally "None" — Home Assistant's MQTT integration
    # treats that exact string as a reserved "unknown" sentinel, not a selectable value.)
    # To hand-pick a subset instead, use a plain list like the old
    # ["kiosk", "magicmirror"] — those keys must match apps.yaml entries.
    options: "{{apps_all}}"
    # Optional: overrides "No Startup App" as the pre-selected option. Must be the app's
    # apps.yaml *key* (or "No Startup App"), not its display `name` — e.g.
    # "homeassistant_mirror_dashboard", not "Home Assistant Mirror Dashboard". HA will
    # still display the app's name.
    # default_option: "homeassistant_mirror_dashboard"
    callback: "set_default_app"
    entity_category: "config"
    icon: "mdi:application-cog"

  - name: "App Switcher"
    unique_id: "app_switcher"
    # "{{apps}}" auto-populates the options from apps.yaml, showing each app's `name`
    # (not its key), with "Nothing Running" first — selecting it stops whatever app is
    # currently running, same as the "Stop All Apps" button.
    options: "{{apps}}"
    # Reflects (and controls) the app that's actually running right now, not a persisted
    # preference — this just reflects reality at startup, since no app has launched yet.
    default_option: "Nothing Running"
    callback: "switch_to_app"
    icon: "mdi:apps"
name: "Magic Mirror"

# Absolute path to the Pi user's home directory. Used for the Chromium profile,
# MagicMirror's install location, and anywhere else a per-user path is needed.
# If omitted, defaults to whichever user the supervisor process runs as.
user_home: "/home/chris"

# run this command to get your Raspberry Pi board:
# cat /sys/firmware/devicetree/base/model;echo
manufacturer: "Raspberry Pi"
model: "4 Model B Rev 1.5"

log_level: "INFO"

# Fallback app to auto-start at boot if no network-connected startup has happened yet
# to save a choice via the "Default Startup App" select in Home Assistant.
# Must match an app key from apps.yaml. Leave unset/blank (or "No Startup App") to disable auto-start entirely.
default_app: "homeassistant_mirror_dashboard"

# Switchable TV inputs, by their CEC physical address (run `echo 'scan' | cec-client -s -d 1`
# to find these for your own TV/wiring). "rPi" and "hdmi" are the fixed keys the code looks
# up; "name" is what shows up in Home Assistant. The "hdmi" input's name is only a fallback —
# the "TV Input" select swaps in whatever CEC-aware device (e.g. an Apple TV) is actually
# detected there, if any.
tv_inputs:
  rPi:
    name: "Raspberry Pi"
    address: "2.0.0.0"
  hdmi:
    name: "HDMI 3"
    address: "3.0.0.0"


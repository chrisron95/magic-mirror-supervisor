buttons:
  - name: "Button 1"
    pin: 25
    hold_time: 1
    triggers:
      1: "tv.toggle_power"
      2: "supervisor.toggle_mirror_mode"
      hold: "tv.rotate_input"

  - name: "Button 2"
    pin: 24
    hold_time: 1
    triggers:
      1: "supervisor.switch_apps"
      hold: "supervisor.app_selector"

  - name: "Button 3"
    pin: 23
    hold_time: 1
    triggers:
      1: "supervisor.stop_all_apps"
      hold: ["tv.standby", "utils.shutdown"]

# Each button is a GPIO pin + a `triggers` map keyed by press count or "hold". A count
# with no entry is ignored. A trigger's value is a dotted path (or list of them, run in
# order), resolved against tv/supervisor/utils.
#
# Optional `hold_repeat: true` makes the `hold` trigger fire repeatedly (every
# `hold_time` seconds) for as long as the button stays held, instead of firing once --
# e.g. for a press-and-hold volume ramp via utils.volume_up/utils.volume_down. Defaults
# to false, so existing one-shot hold actions (rotate_input, standby+shutdown, etc.)
# are unaffected. A short `hold_time` (e.g. 0.2) gives a snappier repeat cadence, since
# it also doubles as the interval between repeats.

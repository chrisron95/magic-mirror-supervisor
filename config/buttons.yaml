buttons:
  - name: "Button 1"
    pin: 25
    hold_time: 1
    triggers:
      1: "tv.toggle_power"
      hold: "tv.rotate_input"

  - name: "Button 2"
    pin: 24
    hold_time: 1
    triggers:
      1: "supervisor.switch_apps"
      hold: "supervisor.app_selector"

  - name: "Button 3"
    pin: 23
    hold_time: 1
    triggers:
      1: "supervisor.stop_all_apps"
      hold: ["tv.standby", "utils.shutdown"]

# Each button is a GPIO pin + a `triggers` map keyed by press count or "hold". A count
# with no entry is ignored. A trigger's value is a dotted path (or list of them, run in
# order), resolved against tv/supervisor/utils.

apps:
  homeassistant_mirror_dashboard:
    app: "kiosk"
    name: "Home Assistant Mirror Dashboard"
    url: "{{secrets.ha_url}}/dashboard-magicmirror/dashboard"

  magicmirror2:
    name: "MagicMirror2"
    working_directory: "{{user_home}}/MagicMirror"
    command: "/usr/bin/npm start"
    restart: true

# Two ways to add an app here:
#   - Reference a built-in type via `app: "<type>"` (see app/app_templates.py) and just
#     provide type-specific overrides — for "kiosk" that's usually just `url` (see above).
#     Any other template field (setup/background/command/liveness_check/etc.) can also be
#     overridden per-instance if needed, e.g. to add a second kiosk with its own liveness
#     thresholds.
#   - Or define everything directly: `working_directory`, `environment`, `setup`,
#     `background`, `command`, `restart`, `liveness_check` — see "magicmirror" above.
# Either way, wire it up to a button/select in entities.yaml the same way "kiosk" and
# "magicmirror" are. "{{user_home}}" and "{{uid}}" are available anywhere in this file or
# in a template; templated apps also get "{{url}}" from their own `url:` key. Reference
# values from config/secrets.yaml anywhere with "{{secrets.<key>}}", e.g. "{{secrets.ha_url}}"
# above, so things like internal IP addresses don't need to live in this (tracked) file.
